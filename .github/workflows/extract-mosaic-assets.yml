name: Extract Mosaic Website Assets

on:
  push:
    branches:
      - fix/mosaic-extract-v2
    paths:
      - '.upload/mosaic/**'
      - '.github/workflows/extract-mosaic-assets.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.upload/mosaic/**'
      - '.github/workflows/extract-mosaic-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Diagnose archive parts
        shell: bash
        run: |
          set +e
          set +o pipefail
          set -u
          shopt -s nullglob
          parts=(.upload/mosaic/part-*.b64)
          report=.upload/mosaic/diagnostics.txt
          : > "$report"
          echo "part_count=${#parts[@]}" >> "$report"

          independent=/tmp/independent.zip
          joined=/tmp/joined.zip
          : > "$independent"

          for part in "${parts[@]}"; do
            chars=$(wc -c < "$part")
            ending=$(tail -c 12 "$part" | tr -d '\n\r')
            base64 --decode "$part" > /tmp/one.bin 2>/tmp/one.err
            status=$?
            if [ "$status" -eq 0 ]; then
              bytes=$(wc -c < /tmp/one.bin)
              cat /tmp/one.bin >> "$independent"
              echo "$part chars=$chars decode=ok bytes=$bytes ending=$ending" >> "$report"
            else
              err=$(tr '\n' ' ' < /tmp/one.err)
              echo "$part chars=$chars decode=FAIL status=$status ending=$ending error=$err" >> "$report"
            fi
          done

          cat "${parts[@]}" | base64 --decode > "$joined" 2>/tmp/joined.err
          joined_status=$?
          echo "joined_decode_status=$joined_status joined_bytes=$(wc -c < "$joined") joined_error=$(tr '\n' ' ' < /tmp/joined.err)" >> "$report"

          unzip -t "$independent" >/tmp/independent-test.txt 2>&1
          independent_status=$?
          echo "independent_unzip_status=$independent_status independent_bytes=$(wc -c < "$independent")" >> "$report"
          tail -n 8 /tmp/independent-test.txt >> "$report"

          unzip -t "$joined" >/tmp/joined-test.txt 2>&1
          joined_unzip_status=$?
          echo "joined_unzip_status=$joined_unzip_status joined_bytes=$(wc -c < "$joined")" >> "$report"
          tail -n 8 /tmp/joined-test.txt >> "$report"

          cat "$report"
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .upload/mosaic/diagnostics.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Add mosaic archive diagnostics'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
