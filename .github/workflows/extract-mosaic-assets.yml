name: Extract Mosaic Website Assets

on:
  push:
    branches:
      - agent/add-mosaic-assets-ready
    paths:
      - '.upload/mosaic/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-mosaic-assets-ready
          fetch-depth: 0

      - name: Rebuild, validate and extract archive
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.upload/mosaic/part-*.b64)
          if [ ${#parts[@]} -eq 0 ]; then
            echo 'No archive parts found.'
            exit 1
          fi
          cat "${parts[@]}" | base64 --decode > /tmp/walldecor99-mosaic-assets.zip
          unzip -t /tmp/walldecor99-mosaic-assets.zip
          rm -rf public/products/mosaic-tiles
          unzip -o /tmp/walldecor99-mosaic-assets.zip -d .
          test -f public/products/mosaic-tiles/products.json
          test -f public/products/mosaic-tiles/mt-11-m-product.webp
          rm -rf .upload/mosaic

      - name: Commit extracted website assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Extract Walldecor99 mosaic website assets'
          git push origin HEAD:agent/add-mosaic-assets-ready
