name: Extract Mosaic Website Assets

on:
  push:
    branches:
      - main
      - agent/add-mosaic-assets-ready
    paths:
      - '.upload/mosaic/**'
      - '.github/workflows/extract-mosaic-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Rebuild, validate and extract archive
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.upload/mosaic/part-*.b64)
          if [ ${#parts[@]} -eq 0 ]; then
            echo 'No archive parts found; the assets may already be extracted.'
            exit 0
          fi

          archive=/tmp/walldecor99-mosaic-assets.zip
          : > "$archive"
          for part in "${parts[@]}"; do
            echo "Decoding $part"
            base64 --decode "$part" >> "$archive"
          done

          unzip -t "$archive"
          rm -rf public/products/mosaic-tiles
          unzip -o "$archive" -d .
          test -f public/products/mosaic-tiles/products.json
          test -f public/products/mosaic-tiles/mt-11-m-product.webp
          rm -rf .upload/mosaic

      - name: Commit extracted website assets
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo 'Nothing to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Extract Walldecor99 mosaic website assets'
          git push origin HEAD:${{ github.ref_name }}
