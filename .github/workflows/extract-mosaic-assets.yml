name: Extract Mosaic Website Assets

on:
  pull_request:
    branches:
      - main
    paths:
      - '.upload/mosaic/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Rebuild, validate and extract archive
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.upload/mosaic/part-*.b64)
          test ${#parts[@]} -gt 0
          archive=/tmp/walldecor99-mosaic-assets.zip
          : > "$archive"
          for part in "${parts[@]}"; do
            echo "Decoding $part"
            base64 --decode "$part" >> "$archive"
          done
          unzip -t "$archive"
          rm -rf public/products/mosaic-tiles
          unzip -o "$archive" -d .
          test -f public/products/mosaic-tiles/products.json
          test -f public/products/mosaic-tiles/mt-11-m-product.webp

      - name: Commit extracted website assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/products/mosaic-tiles
          if git diff --cached --quiet; then
            echo 'Nothing to commit.'
            exit 0
          fi
          git commit -m 'Extract Walldecor99 mosaic website assets'
          git push origin HEAD:${{ github.head_ref }}
